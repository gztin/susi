<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR 數位名片系統 | 快速掃描註冊</title>
    <link rel="stylesheet" href="style.css">
    <script src="qrcode.min.js"></script>
</head>
<body>
    <div class="container flex-center min-vh-100">
        <header class="animate-in" style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-size: 2.5rem; margin-bottom: 12px;">QR Connect</h1>
            <p style="color: var(--text-secondary);">掃描下方 QR Code 即可自動生成您的數位名片</p>
        </header>

        <main class="animate-in" style="animation-delay: 0.2s;">
            <div class="glass-card flex-center" style="padding: 32px; margin-bottom: 32px; width: 320px; height: 320px; position: relative;">
                <div id="system-qr" style="background: white; padding: 12px; border-radius: 12px;"></div>
                <div style="position: absolute; bottom: -12px; background: var(--primary-color); color: #000; padding: 4px 16px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; box-shadow: 0 4px 12px var(--primary-glow);">
                    SCAN TO JOIN
                </div>
            </div>

            <div class="flex-center" style="gap: 16px; width: 100%;">
                <button onclick="App.register()" class="btn btn-primary" style="width: 100%;">點擊模擬掃描註冊</button>
                
                <div style="margin: 24px 0; color: var(--text-secondary); display: flex; align-items: center; gap: 12px; width: 100%;">
                    <hr style="flex: 1; border: 0.5px solid var(--surface-border);">
                    <span style="font-size: 0.8rem;">或使用序號登入</span>
                    <hr style="flex: 1; border: 0.5px solid var(--surface-border);">
                </div>

                <div style="display: flex; gap: 8px; width: 100%;">
                    <input type="text" id="login-id" maxlength="4" placeholder="4 碼序號" class="mono" style="flex: 1; background: var(--surface-color); border: 1px solid var(--surface-border); border-radius: var(--radius-md); padding: 12px; color: white; text-align: center; text-transform: uppercase; font-size: 1.2rem;">
                    <button onclick="handleLogin()" class="btn" style="background: white; color: black; padding: 12px 20px;">登入</button>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Generate a registration URL for the QR code
            const regUrl = window.location.origin + window.location.pathname + '?reg=1';
            new QRCode(document.getElementById("system-qr"), {
                text: regUrl,
                width: 220,
                height: 220,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        });

        function handleLogin() {
            const id = document.getElementById('login-id').value;
            if (id.length === 4) {
                App.login(id);
            } else {
                alert('請輸入 4 碼序號');
            }
        }
    </script>
</body>
</html>
