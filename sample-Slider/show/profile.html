<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的名片 | QR Connect</title>
    <link rel="stylesheet" href="style.css?v=1.0.1">
    <script src="qrcode.min.js?v=1.0.1"></script>
    <style>
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
            background: #222;
        }
        .section-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 32px 0 16px;
        }
        .friend-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .id-badge {
            background: var(--primary-color);
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 800;
        }
        .fab {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 64px;
            height: 64px;
            border-radius: 32px;
            background: var(--primary-color);
            color: black;
            box-shadow: 0 8px 24px var(--primary-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="animate-in">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
                <h2 style="font-size: 1.2rem;">我的名片</h2>
                <button onclick="App.logout()" style="background: none; border: none; color: var(--text-secondary); font-size: 0.8rem; cursor: pointer;">登出</button>
            </div>
            
            <div class="glass-card" style="padding: 24px;">
                <div class="profile-header">
                    <img id="user-avatar" src="" alt="Avatar" class="avatar">
                    <div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <h1 id="user-name" style="font-size: 1.5rem;">載入中...</h1>
                            <span id="user-id-badge" class="id-badge mono">ID</span>
                        </div>
                        <p id="user-title" style="color: var(--text-secondary); font-size: 0.9rem;">載入中...</p>
                    </div>
                </div>
                
                <div id="personal-qr" style="background: white; padding: 12px; border-radius: 12px; margin: 0 auto 20px; width: fit-content;"></div>
                <p style="text-align: center; color: var(--text-secondary); font-size: 0.8rem;">掃描此 QR Code 以加我好友</p>
            </div>
        </header>

        <section class="animate-in" style="animation-delay: 0.3s;">
            <div class="section-title">好友清單 (<span id="friend-count">0</span>)</div>
            <div id="friend-list" class="friend-list">
                <!-- Friends will be injected here -->
                <p id="no-friends" style="color: var(--text-secondary); font-style: italic; text-align: center; padding: 20px;">尚無好友，去掃描別人的 QR Code 吧！</p>
            </div>
        </section>
    </div>

    <!-- Floating Action Button for Scanning -->
    <div class="fab" onclick="window.location.href='scan.html'">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
    </div>

    <script src="app.js?v=1.0.1"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = App.state.currentUser;
            if (!user) return;

            // Fill User Info
            document.getElementById('user-avatar').src = user.avatar;
            document.getElementById('user-name').innerText = user.name;
            document.getElementById('user-title').innerText = user.title;
            document.getElementById('user-id-badge').innerText = user.id;

            // Generate Personal QR
            try {
                const shareUrl = window.location.origin + window.location.pathname.replace('profile.html', 'index.html') + 
                               '?reg=1&add=' + user.id;
                
                new QRCode(document.getElementById("personal-qr"), {
                    text: shareUrl,
                    width: 160,
                    height: 160,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            } catch (err) {
                console.error("QR Generation Error:", err);
                document.getElementById("personal-qr").innerHTML = "<p style='color:red'>QR Code 生成失敗</p>";
            }

            // Fill Friend List
            const friendList = document.getElementById('friend-list');
            const friends = App.state.friends;
            document.getElementById('friend-count').innerText = friends.length;

            if (friends.length > 0) {
                document.getElementById('no-friends').remove();
                friends.forEach(friend => {
                    const el = document.createElement('div');
                    el.className = 'friend-item';
                    el.innerHTML = `
                        <img src="${friend.avatar}" style="width: 40px; height: 40px; border-radius: 20px;">
                        <div style="flex: 1;">
                            <div style="font-weight: 600;">${friend.name}</div>
                            <div class="mono" style="font-size: 0.7rem; color: var(--text-secondary);">${friend.id}</div>
                        </div>
                        <div style="width: 8px; height: 8px; background: #00FF85; border-radius: 4px;"></div>
                    `;
                    friendList.appendChild(el);
                });
            }
        });
    </script>
</body>
</html>
