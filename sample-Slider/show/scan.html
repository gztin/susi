<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>掃描加好友 | QR Connect</title>
    <link rel="stylesheet" href="style.css?v=1.0.1">
    <script src="html5-qrcode.min.js?v=1.0.1"></script>
    <style>
        body {
            background-color: #000;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #reader {
            width: 100%;
            height: 100%;
            border: none !important;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }
        #reader video {
            object-fit: cover !important;
        }
        
        /* Header UI */
        .ui-top {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .header-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            width: 44px; height: 44px;
            border-radius: 22px;
            color: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        /* Center Button Area */
        .center-action {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            text-align: center;
        }
        .camera-trigger {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: var(--primary-color);
            color: black;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px var(--primary-glow);
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .camera-trigger:active { transform: translate(-50%, -50%) scale(0.9); }

        /* Action Sheet Popup */
        .action-sheet-overlay {
            position: fixed;
            bottom: -100%; left: 0; right: 0;
            background: rgba(20, 20, 22, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px 24px 0 0;
            padding: 24px;
            z-index: 100;
            transition: bottom 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .action-sheet-overlay.active { bottom: 0; }
        .action-item {
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            margin-bottom: 12px;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            cursor: pointer;
        }
        .action-item:last-child { margin-bottom: 0; }
        .backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            opacity: 0;
            pointer-events: none;
            z-index: 90;
            transition: opacity 0.3s;
        }
        .backdrop.active { opacity: 1; pointer-events: auto; }

        /* Scanning Visuals */
        .scan-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: none; /* Only show when scanning */
            flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none;
        }
        .scan-frame {
            width: 260px; height: 260px;
            border: 2px solid var(--primary-color);
            border-radius: 40px;
            position: relative;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        .scan-line {
            width: 100%; height: 3px;
            background: var(--primary-color);
            position: absolute; top: 0;
            animation: scanAnim 2.5s infinite ease-in-out;
            box-shadow: 0 0 15px var(--primary-color);
        }
        @keyframes scanAnim { 0%, 100% { top: 0%; } 50% { top: 100%; } }
    </style>
</head>
<body>
    <!-- Top Header -->
    <header class="ui-top">
        <button onclick="window.history.back()" class="header-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h2 style="font-size: 1.1rem; font-weight: 600; color: white;">掃描加好友</h2>
        <button onclick="window.location.href='profile.html'" class="header-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </button>
    </header>

    <!-- Initial Action Button -->
    <div id="trigger-area" class="center-action">
        <button onclick="toggleSheet(true)" class="camera-trigger">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
        </button>
        <p style="color: var(--text-secondary); margin-top: 16px;">點擊開啟相機或選擇圖片</p>
    </div>

    <!-- Scanning Visual Area -->
    <div id="scan-visual" class="scan-overlay">
        <div class="scan-frame">
            <div class="scan-line"></div>
        </div>
        <p style="color: white; margin-top: 24px; font-size: 0.9rem;">請對準好友的 QR Code</p>
    </div>

    <div id="reader"></div>

    <!-- Action Sheet Overlay -->
    <div id="backdrop" class="backdrop" onclick="toggleSheet(false)"></div>
    <div id="action-sheet" class="action-sheet-overlay">
        <div style="width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 24px;"></div>
        <button onclick="startCamera()" class="action-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            使用相機掃描
        </button>
        <button onclick="triggerFileSelect()" class="action-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            從相簿選擇圖片
        </button>
        <button onclick="toggleSheet(false)" class="action-item" style="background: transparent; color: var(--text-secondary);">取消</button>
    </div>

    <!-- Hidden File Input -->
    <input type="file" id="qr-file" accept="image/*" style="display: none;">

    <script src="app.js?v=1.0.1"></script>
    <script>
        const html5QrCode = new Html5Qrcode("reader");
        
        function toggleSheet(show) {
            document.getElementById('action-sheet').classList.toggle('active', show);
            document.getElementById('backdrop').classList.toggle('active', show);
        }

        function startCamera() {
            toggleSheet(false);
            document.getElementById('trigger-area').style.display = 'none';
            document.getElementById('scan-visual').style.display = 'flex';
            
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 15, qrbox: { width: 260, height: 260 } }, 
                onScanSuccess
            ).catch(err => {
                alert("相機開啟失敗：" + err);
                resetUI();
            });
        }

        function triggerFileSelect() {
            toggleSheet(false);
            document.getElementById('qr-file').click();
        }

        document.getElementById('qr-file').addEventListener('change', e => {
            if (e.target.files.length === 0) return;
            const imageFile = e.target.files[0];
            html5QrCode.scanFile(imageFile, true)
                .then(decodedText => onScanSuccess(decodedText))
                .catch(err => alert("無法辨識圖片中的 QR Code，請重試。"));
        });

        function onScanSuccess(decodedText) {
            if (navigator.vibrate) navigator.vibrate(100);
            html5QrCode.stop().then(() => {
                App.addFriend(decodedText.toUpperCase());
            }).catch(() => {
                // If scan was from file, stop might not be needed
                App.addFriend(decodedText.toUpperCase());
            });
        }

        function resetUI() {
            document.getElementById('trigger-area').style.display = 'block';
            document.getElementById('scan-visual').style.display = 'none';
        }
    </script>
</body>
</html>
