<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>掃描加好友 | QR Connect</title>
    <link rel="stylesheet" href="style.css">
    <script src="html5-qrcode.min.js"></script>
    <style>
        body {
            background-color: #000;
            height: 100vh;
            overflow: hidden;
        }
        #reader {
            width: 100%;
            height: 100vh;
            border: none !important;
        }
        #reader video {
            object-fit: cover !important;
        }
        .scan-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .scan-frame {
            width: 260px;
            height: 260px;
            border: 2px solid rgba(0, 209, 255, 0.5);
            border-radius: 40px;
            position: relative;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        .scan-line {
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, transparent, var(--primary-color), transparent);
            position: absolute;
            top: 0;
            animation: scanAnim 2.5s infinite ease-in-out;
            box-shadow: 0 0 15px var(--primary-color);
        }
        @keyframes scanAnim {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        .ui-top {
            position: fixed;
            top: 24px; left: 24px;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .ui-bottom {
            position: fixed;
            bottom: 60px;
            z-index: 20;
            text-align: center;
            width: 100%;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            width: 44px; height: 44px;
            border-radius: 22px;
            color: white;
            display: flex; align-items: center; justify-content: center;
        }
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="flex-center">
            <div style="width: 40px; height: 40px; border: 3px solid var(--primary-color); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 16px; color: var(--text-secondary);">正在啟動相機...</p>
        </div>
    </div>

    <div class="ui-top">
        <button onclick="window.location.href='profile.html'" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h2 style="font-size: 1.1rem; font-weight: 600;">掃描加好友</h2>
    </div>

    <div class="scan-overlay">
        <div class="scan-frame">
            <div class="scan-line"></div>
        </div>
    </div>

    <div class="ui-bottom">
        <p style="font-size: 0.9rem; opacity: 0.8;">請將對方的 QR Code 置於框內</p>
    </div>

    <div id="reader"></div>

    <script src="app.js"></script>
    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 15, qrbox: { width: 260, height: 260 } };

        function startScanner() {
            // Use 'environment' for back camera
            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess
            ).then(() => {
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500);
            }).catch(err => {
                console.error(err);
                alert("無法啟動相機。請確保已授予權限，且正在使用 HTTPS 或 localhost。");
                window.location.href = 'profile.html';
            });
        }

        function onScanSuccess(decodedText) {
            // Vibrate if supported
            if (navigator.vibrate) navigator.vibrate(100);
            
            // Stop scanning and process
            html5QrCode.stop().then(() => {
                App.addFriend(decodedText.toUpperCase());
            });
        }

        // Start on page load
        window.addEventListener('load', startScanner);

        // Define spin animation for loader
        const style = document.createElement('style');
        style.innerHTML = `@keyframes spin { to { transform: rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
