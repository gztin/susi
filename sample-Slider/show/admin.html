<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統管理後台 | QR Connect</title>
    <link rel="stylesheet" href="style.css?v=1.0.1">
    <style>
        .admin-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--bg-surface);
            padding: 24px;
            border-radius: 20px;
            border: 1.5px solid rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-card h3 { color: var(--text-med); font-size: 0.9rem; margin-bottom: 8px; }
        .stat-card p { font-size: 2.5rem; font-weight: 800; color: var(--primary); }

        .member-list {
            background: var(--bg-surface);
            border-radius: 24px;
            border: 1.5px solid rgba(0,0,0,0.1);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: var(--bg-surface-elevated);
            padding: 16px;
            text-align: left;
            font-size: 0.8rem;
            color: var(--text-med);
            text-transform: uppercase;
        }
        td {
            padding: 16px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 0.9rem;
        }
        .friend-tag {
            background: var(--primary-dim);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <header style="margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1 style="font-size: 2rem;">系統管理後台</h1>
                <p style="color: var(--text-med);">目前所有註冊會員清單</p>
            </div>
            <button onclick="window.location.href='index.html'" class="btn btn-secondary">退出登入</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>總會員數</h3>
                <p id="total-members">0</p>
            </div>
            <div class="stat-card">
                <h3>今日新增</h3>
                <p id="today-new">0</p>
            </div>
        </div>

        <div class="member-list">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>姓名 / 職稱</th>
                        <th>好友清帶 (ID)</th>
                    </tr>
                </thead>
                <tbody id="member-table-body">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="app.js?v=1.0.1"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderAdminData();
        });

        async function renderAdminData() {
            const tableBody = document.getElementById('member-table-body');
            let members = [];

            // Attempt to fetch from Cloud if configured
            if (App.state.binId && !App.state.binId.includes('YOUR_')) {
                try {
                    const res = await fetch(`https://api.jsonbin.io/v3/b/${App.state.binId}/latest`, {
                        headers: { 'X-Master-Key': App.state.masterKey }
                    });
                    const result = await res.json();
                    members = Array.isArray(result.record) ? result.record : (result.record.members || []);
                } catch (e) {
                    console.error('Cloud Fetch Error', e);
                    members = JSON.parse(localStorage.getItem('all_members') || '[]');
                }
            } else {
                members = JSON.parse(localStorage.getItem('all_members') || '[]');
            }

            document.getElementById('total-members').innerText = members.length;
            
            tableBody.innerHTML = members.map(m => `
                <tr>
                    <td class="mono" style="font-weight: 700; color: var(--primary);">${m.id}</td>
                    <td>
                        <div style="font-weight: 600;">${m.name}</div>
                        <div style="font-size: 0.8rem; color: var(--text-med);">${m.title}</div>
                    </td>
                    <td>
                        ${m.friends && m.friends.length > 0 
                            ? m.friends.map(f => `<span class="friend-tag">${f.id}</span>`).join('') 
                            : '<span style="color: var(--text-low); font-size: 0.8rem;">暫無好友</span>'}
                    </td>
                </tr>
            `).join('');

            if (members.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3" style="text-align: center; padding: 40px; color: var(--text-low);">目前尚未有會員註冊</td></tr>';
            }
        }
    </script>
</body>
</html>
