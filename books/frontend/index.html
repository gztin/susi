<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>寶可夢卡牌瀏覽器</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #e63946, #f4a261);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    header h1 { font-size: 1.6rem; font-weight: 700; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

    .pokeball {
      width: 36px; height: 36px;
      background: conic-gradient(#e63946 0deg 180deg, #fff 180deg 360deg);
      border-radius: 50%;
      border: 3px solid #333;
      position: relative; flex-shrink: 0;
    }
    .pokeball::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 10px; height: 10px;
      background: #fff; border-radius: 50%; border: 3px solid #333;
    }

    /* Controls */
    .controls {
      padding: 16px 32px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    .controls input, .controls select {
      padding: 9px 14px;
      border-radius: 8px;
      border: 2px solid #0f3460;
      background: #1a1a2e;
      color: #eee;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .controls input { width: 200px; }
    .controls input:focus, .controls select:focus { border-color: #f4a261; }
    .controls select { cursor: pointer; }
    .controls button {
      padding: 9px 20px;
      border-radius: 8px; border: none;
      background: linear-gradient(135deg, #e63946, #f4a261);
      color: #fff; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .controls button:hover { opacity: 0.88; transform: translateY(-1px); }
    .controls button.secondary {
      background: transparent;
      border: 2px solid #0f3460;
      color: #aaa;
    }
    .controls button.secondary:hover { border-color: #f4a261; color: #f4a261; }

    /* Breadcrumbs */
    .breadcrumb {
      padding: 12px 32px 0;
      font-size: 0.88rem;
      color: #888;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .breadcrumb a {
      color: #f4a261;
      text-decoration: none;
      cursor: pointer;
    }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb span.sep { color: #444; }

    /* Status bar */
    #status {
      padding: 10px 32px;
      font-size: 0.82rem;
      color: #888;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      padding: 0 32px 40px;
    }

    .card {
      background: #16213e;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #0f3460;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      display: flex; flex-direction: column;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
      border-color: #f4a261;
    }
    .jp-market {
      background: rgba(26, 43, 60, 0.4);
      border-left: 4px solid #ee6c4d;
      margin-top: 15px;
    }
    .jp-card-name {
      font-size: 0.95rem;
      color: #ee6c4d;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .price-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .price-item:last-child { border: none; }
    .p-label { font-size: 0.85rem; color: #999; min-width: 60px; }
    .p-val.jpy { font-size: 0.85rem; color: #ccc; }
    .p-val.twd { font-size: 1rem; color: #ffca3a; font-weight: bold; }
    .no-data { color: #666; font-size: 0.85rem; font-style: italic; }
    .card-img-wrap {
      background: #0f3460;
      display: flex; justify-content: center; align-items: center;
      padding: 14px; min-height: 190px;
    }
    .card-img-wrap img { max-width: 100%; max-height: 190px; object-fit: contain; border-radius: 6px; }

    .card-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .card-name { font-size: 0.95rem; font-weight: 700; color: #f4a261; }
    .card-set { font-size: 0.75rem; color: #666; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .tag { font-size: 0.7rem; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
    .tag-type { background: #0f3460; color: #7ec8e3; }
    .tag-rarity { background: #2d1b4e; color: #c77dff; }
    .tag-hp { background: #1b3a2d; color: #52b788; }

    /* Rarity Specific Colors (Simplified Flat Design) */
    .rarity-c { background: #444; color: #ccc; border: 1px solid #555; }
    .rarity-u { background: #555; color: #eee; border: 1px solid #666; }
    .rarity-r { background: #3c096c; color: #e0aaff; border: 1px solid #5a189a; }
    .rarity-rr { background: #9d0208; color: #fff; border: 1px solid #d00000; }
    .rarity-rrr { background: #6a040f; color: #fff; border: 1px solid #900000; }
    .rarity-ar { background: #0077b6; color: #fff; border: 1px solid #0096c7; }
    .rarity-sr { background: #adb5bd; color: #343a40; border: 1px solid #ced4da; }
    .rarity-sar { background: #7b2cbf; color: #fff; border: 1px solid #9d4edd; }
    .rarity-ur { background: #ff9f1c; color: #fff; border: 1px solid #ffbf69; }
    .rarity-ace { background: #ff006e; color: #fff; border: 1px solid #ff4d6d; }
    .rarity-promo { background: #ffc300; color: #000; border: 1px solid #ffd60a; }

    .card-price {
      margin-top: 6px;
      font-size: 0.78rem;
      color: #f4a261;
      font-weight: 600;
    }

    /* Set Card (Box) */
    .card.set-card {
      aspect-ratio: 16 / 9;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(145deg, #1e2a4a, #16213e);
    }
    .card.set-card .set-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
      transition: transform 0.3s;
    }
    .card.set-card:hover .set-logo {
      transform: scale(1.08);
    }
    .set-name-overlay {
      margin-top: 12px;
      text-align: center;
      font-weight: 700;
      font-size: 0.9rem;
      color: #eee;
    }

    /* Popular Section */
    .popular-section {
      padding: 40px 32px;
      background: #111;
      border-top: 2px solid #0f3460;
      margin-top: 40px;
    }
    .popular-section h2 {
      font-size: 1.4rem;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #f4a261;
    }
    .popular-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }
    .pop-card {
      display: flex; align-items: center; gap: 12px;
      background: #16213e; padding: 10px; border-radius: 10px;
      cursor: pointer; transition: background 0.2s;
    }
    .pop-card:hover { background: #1e2a4a; }
    .pop-card img { width: 40px; height: 56px; object-fit: contain; border-radius: 4px; }
    .pop-info { display: flex; flex-direction: column; overflow: hidden; }
    .pop-name { font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pop-clicks { font-size: 0.72rem; color: #888; }

    /* Loader */
    .loader { display: flex; justify-content: center; align-items: center; padding: 60px; grid-column: 1 / -1; }
    .spinner {
      width: 44px; height: 44px;
      border: 5px solid #0f3460; border-top-color: #f4a261;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Pagination */
    .pagination {
      display: flex; justify-content: center; gap: 10px;
      padding: 16px 32px 40px; align-items: center; flex-wrap: wrap;
    }
    .pagination button {
      padding: 7px 18px; border-radius: 8px;
      border: 2px solid #0f3460; background: #16213e;
      color: #eee; cursor: pointer; font-size: 0.88rem; transition: all 0.2s;
    }
    .pagination button:hover:not(:disabled) { border-color: #f4a261; color: #f4a261; }
    .pagination button:disabled { opacity: 0.3; cursor: default; }
    .pagination button.active { border-color: #f4a261; color: #f4a261; background: #1e2a4a; }
    .pagination span { color: #888; font-size: 0.88rem; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); z-index: 100;
      justify-content: center; align-items: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #16213e; border-radius: 20px;
      max-width: 720px; width: 100%; max-height: 92vh;
      overflow-y: auto; border: 1px solid #0f3460;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 24px; border-bottom: 1px solid #0f3460;
      position: sticky; top: 0; background: #16213e; z-index: 1;
    }
    .modal-header h2 { font-size: 1.2rem; color: #f4a261; }
    .modal-close {
      background: none; border: none; color: #aaa;
      font-size: 1.4rem; cursor: pointer; line-height: 1; padding: 4px 8px;
      border-radius: 6px; transition: background 0.2s;
    }
    .modal-close:hover { background: #0f3460; color: #fff; }

    .modal-body { display: flex; gap: 24px; padding: 24px; flex-wrap: wrap; }
    .modal-img { flex-shrink: 0; }
    .modal-img img { width: 210px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }

    .modal-info { flex: 1; min-width: 220px; }
    .modal-info h3 { font-size: 1rem; color: #7ec8e3; margin: 14px 0 6px; border-bottom: 1px solid #0f3460; padding-bottom: 4px; }
    .modal-info h3:first-child { margin-top: 0; }
    .modal-info p { font-size: 0.85rem; color: #ccc; line-height: 1.7; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; }
    .info-grid p { font-size: 0.83rem; }
    .info-label { color: #888; }

    .attack-item {
      background: #0f3460; border-radius: 8px;
      padding: 9px 12px; margin-bottom: 7px;
    }
    .attack-name { font-weight: 700; color: #f4a261; font-size: 0.88rem; }
    .attack-damage { color: #e63946; font-weight: 700; font-size: 0.88rem; }
    .attack-cost { font-size: 0.75rem; color: #888; margin-top: 2px; }

    .price-block { background: #0f3460; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
    .price-platform { font-weight: 700; font-size: 0.88rem; color: #f4a261; margin-bottom: 8px; }
    .price-update { font-size: 0.73rem; color: #666; font-weight: 400; margin-left: 8px; }
    .price-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; align-items: center; }
    .price-label { font-size: 0.78rem; color: #aaa; min-width: 52px; }
    .price-item { font-size: 0.78rem; padding: 2px 7px; border-radius: 6px; font-weight: 600; }
    .price-item.low { background: #1b3a2d; color: #52b788; }
    .price-item.mid { background: #1b2d3a; color: #7ec8e3; }
    .price-item.market { background: #3a2d1b; color: #f4a261; }
    .price-item.high { background: #3a1b1b; color: #e63946; }
    .price-link { display: inline-block; margin-top: 8px; font-size: 0.78rem; color: #7ec8e3; text-decoration: none; }
    .price-link:hover { text-decoration: underline; }
    .price-avg-row { font-size: 0.76rem; color: #777; margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }

    .legality-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .legal-tag { font-size: 0.72rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    .legal-tag.legal { background: #1b3a2d; color: #52b788; }
    .legal-tag.banned { background: #3a1b1b; color: #e63946; }
    .legal-tag.unknown { background: #2a2a2a; color: #666; }

    .no-data { color: #555; font-size: 0.82rem; font-style: italic; }
  </style>
</head>
<body>

<header>
  <div class="pokeball"></div>
  <h1>寶可夢卡牌瀏覽器</h1>
</header>

<div class="controls">
  <input type="text" id="searchInput" placeholder="搜尋卡片名稱..." />
  <select id="typeSelect">
    <option value="">所有屬性</option>
    <option value="Fire">🔥 火</option>
    <option value="Water">💧 水</option>
    <option value="Grass">🌿 草</option>
    <option value="Lightning">⚡ 電</option>
    <option value="Psychic">🔮 超能</option>
    <option value="Fighting">👊 格鬥</option>
    <option value="Darkness">🌑 惡</option>
    <option value="Metal">⚙️ 鋼</option>
    <option value="Dragon">🐉 龍</option>
    <option value="Colorless">⭐ 無色</option>
  </select>
  <select id="raritySelect">
    <option value="">所有稀有度</option>
    <option value="Common">Common</option>
    <option value="Uncommon">Uncommon</option>
    <option value="Rare">Rare</option>
    <option value="Rare Holo">Rare Holo</option>
    <option value="Rare Holo EX">Rare Holo EX</option>
    <option value="Rare Holo GX">Rare Holo GX</option>
    <option value="Rare Holo V">Rare Holo V</option>
    <option value="Rare Holo VMAX">Rare Holo VMAX</option>
    <option value="Rare Holo VSTAR">Rare Holo VSTAR</option>
    <option value="Rare Ultra">Rare Ultra</option>
    <option value="Rare Rainbow">Rare Rainbow</option>
    <option value="Rare Secret">Rare Secret</option>
    <option value="Amazing Rare">Amazing Rare</option>
    <option value="Illustration Rare">Illustration Rare</option>
    <option value="Special Illustration Rare">Special Illustration Rare</option>
    <option value="Hyper Rare">Hyper Rare</option>
    <option value="Promo">Promo</option>
  </select>
  <select id="supertypeSelect">
    <option value="">所有類型</option>
    <option value="Pokémon">寶可夢</option>
    <option value="Trainer">訓練家</option>
    <option value="Energy">能量</option>
  </select>
  <select id="setSelect">
    <option value="">所有系列</option>
  </select>
  <button onclick="fetchCardsForDisplay(1)">搜尋</button>
  <button class="secondary" onclick="resetSearch()">重置</button>
  <select id="langSelect" onchange="changeLang(this.value)">
    <option value="zh-TW">繁體中文</option>
    <option value="en">English</option>
    <option value="ja">日本語</option>
  </select>
</div>

<div id="breadcrumb" class="breadcrumb"></div>

<div id="paginationTop" class="pagination"></div>

<div id="status">載入中...</div>
<div class="grid" id="grid"></div>
<div class="pagination" id="pagination"></div>

<div id="popularSection" class="popular-section" style="display:none">
  <h2>🔥 熱門卡片 Top 10</h2>
  <div id="popularGrid" class="popular-grid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
