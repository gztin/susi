services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "1234:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "3001:3000"
    environment:
      - DB_PATH=/data/poker.db
    volumes:
      - db_data:/data
    restart: unless-stopped

volumes:
  db_data:
